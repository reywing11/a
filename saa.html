<!DOCTYPE html>
<html lang="tr">
<head>
  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>
</head>
<body style="margin:0; background:#000;">
  
<model-viewer
  src="model.glb"
  camera-controls
  auto-rotate
  animation-name="*"
  autoplay
  exposure="1"
  style="width:100vw; height:100vh;">
</model-viewer>

</body>
</html>
